<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ค้นหาคำสำคัญ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #f78166;
    --highlight-bg: #ffd70033;
    --highlight-border: #ffd700;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --success: #3fb950;
    --match-bg: #ffe86633;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
  }
  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), #a371f7);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  header h1 { font-size: 1.1rem; font-weight: 600; color: var(--text); }
  header p { font-size: 0.8rem; color: var(--text-muted); }

  /* Main layout */
  main {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 0;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 73px);
  }

  /* Left panel */
  .panel-left {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-section {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }
  .panel-section label {
    display: block;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 28px 16px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    background: var(--surface2);
    position: relative;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: #58a6ff11; }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-zone .icon { font-size: 2rem; margin-bottom: 8px; }
  .upload-zone p { font-size: 0.82rem; color: var(--text-muted); }
  .upload-zone .file-name {
    font-size: 0.85rem; font-weight: 600;
    color: var(--accent);
    margin-top: 6px;
    word-break: break-all;
  }

  /* Search box */
  .search-wrap { display: flex; flex-direction: column; gap: 8px; }
  .search-input-row { display: flex; gap: 8px; }
  .search-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    font-size: 0.9rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color .2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-family: 'Sarabun', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: opacity .15s;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-sm {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 0.78rem;
    cursor: pointer;
    font-family: 'Sarabun', sans-serif;
    transition: all .15s;
  }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm.active { border-color: var(--accent); color: var(--accent); background: #58a6ff15; }

  /* Options row */
  .options-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .checkbox-label {
    display: flex; align-items: center; gap: 5px;
    font-size: 0.78rem; color: var(--text-muted);
    cursor: pointer;
  }
  .checkbox-label input { accent-color: var(--accent); }

  /* Results list */
  .results-panel {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  .result-count {
    font-size: 0.78rem;
    color: var(--text-muted);
    padding: 8px 8px 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .result-count span { color: var(--success); font-weight: 700; }
  .match-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all .15s;
    position: relative;
  }
  .match-item:hover { border-color: var(--accent); }
  .match-item.active { border-color: var(--accent); background: #58a6ff0d; }
  .match-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .match-context {
    font-size: 0.8rem;
    line-height: 1.5;
    color: var(--text-muted);
    word-break: break-word;
  }
  .match-context mark {
    background: var(--highlight-bg);
    color: #ffd700;
    border-bottom: 2px solid var(--highlight-border);
    border-radius: 2px;
    padding: 0 2px;
    font-weight: 700;
  }

  /* Right panel - document viewer */
  .panel-right {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }
  .viewer-toolbar {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    flex-shrink: 0;
  }
  .nav-btns { display: flex; gap: 6px; }
  .match-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-left: auto;
  }
  .match-badge b { color: #ffd700; }

  .viewer {
    flex: 1;
    overflow-y: auto;
    padding: 28px 36px;
  }
  .viewer-content {
    max-width: 800px;
    margin: 0 auto;
    background: #1c2128;
    border-radius: 12px;
    padding: 40px 48px;
    border: 1px solid var(--border);
    font-size: 0.92rem;
    line-height: 1.8;
    white-space: pre-wrap;
    word-break: break-word;
    color: #cdd9e5;
    font-family: 'Sarabun', sans-serif;
  }
  .viewer-content mark {
    background: var(--match-bg);
    color: #ffd700;
    border-bottom: 2px solid var(--highlight-border);
    border-radius: 2px;
    padding: 0 3px;
    font-weight: 700;
    scroll-margin-top: 120px;
  }
  .viewer-content mark.active-mark {
    background: #ffd70055;
    outline: 2px solid #ffd700;
  }

  /* Empty / loading states */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text-muted);
  }
  .empty-state .big-icon { font-size: 3.5rem; opacity: .4; }
  .empty-state p { font-size: 0.85rem; text-align: center; max-width: 240px; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #484f58; }

  /* Progress bar */
  .progress { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 8px; }
  .progress-bar { height: 100%; background: var(--accent); transition: width .3s; }

  @media (max-width: 768px) {
    main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .panel-left { max-height: 50vh; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🔍</div>
  <div>
    <h1>ค้นหาคำสำคัญในเอกสาร</h1>
    <p>รองรับไฟล์ .docx และ .pdf</p>
  </div>
</header>

<main>
  <!-- LEFT PANEL -->
  <div class="panel-left">
    <div class="panel-section">
      <label>📂 อัปโหลดเอกสาร</label>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept=".docx,.pdf"/>
        <div class="icon">📄</div>
        <p>คลิกหรือลากไฟล์มาวาง</p>
        <p style="font-size:0.72rem; margin-top:4px">.docx / .pdf</p>
        <div class="file-name" id="fileName"></div>
      </div>
      <div class="progress" id="progressWrap" style="display:none">
        <div class="progress-bar" id="progressBar" style="width:0%"></div>
      </div>
    </div>

    <div class="panel-section">
      <label>🔎 คำที่ต้องการค้นหา</label>
      <div class="search-wrap">
        <div class="search-input-row">
          <input class="search-input" id="searchInput" placeholder="พิมพ์คำค้นหา..." type="text"/>
          <button class="btn" id="searchBtn" disabled>ค้นหา</button>
        </div>
        <div class="options-row">
          <label class="checkbox-label">
            <input type="checkbox" id="caseSensitive"/> ตรงตัวพิมพ์
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="wholeWord"/> คำเต็ม
          </label>
        </div>
      </div>
    </div>

    <div class="results-panel" id="resultsPanel">
      <div class="empty-state" id="emptyState">
        <div class="big-icon">📋</div>
        <p>อัปโหลดเอกสารแล้วพิมพ์คำค้นหา</p>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel-right">
    <div class="viewer-toolbar">
      <div class="nav-btns">
        <button class="btn-sm" id="prevBtn" disabled>◀ ก่อนหน้า</button>
        <button class="btn-sm" id="nextBtn" disabled>ถัดไป ▶</button>
      </div>
      <button class="btn-sm" id="clearBtn" style="display:none">ล้างผลการค้นหา</button>
      <div class="match-badge" id="matchBadge" style="display:none">
        ผลที่ <b id="currentMatchNum">-</b> / <b id="totalMatchNum">-</b>
      </div>
    </div>

    <div class="viewer" id="viewer">
      <div class="empty-state">
        <div class="big-icon">📂</div>
        <p>อัปโหลดไฟล์เพื่อดูเนื้อหาเอกสาร</p>
      </div>
    </div>
  </div>
</main>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let fullText = '';
let currentMatchIndex = 0;
let totalMatches = 0;
let markElements = [];

// Upload
const fileInput = document.getElementById('fileInput');
const uploadZone = document.getElementById('uploadZone');
const fileName = document.getElementById('fileName');
const searchBtn = document.getElementById('searchBtn');
const searchInput = document.getElementById('searchInput');
const viewer = document.getElementById('viewer');
const progressWrap = document.getElementById('progressWrap');
const progressBar = document.getElementById('progressBar');

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

async function handleFile(file) {
  fileName.textContent = file.name;
  fullText = '';
  clearSearch();
  showProgress(10);
  viewer.innerHTML = '<div class="empty-state"><div class="spinner"></div><p>กำลังโหลดเอกสาร...</p></div>';

  try {
    if (file.name.endsWith('.pdf')) {
      fullText = await readPDF(file);
    } else if (file.name.endsWith('.docx')) {
      fullText = await readDocx(file);
    } else {
      alert('รองรับเฉพาะไฟล์ .docx และ .pdf เท่านั้น');
      return;
    }
    showProgress(100);
    setTimeout(() => progressWrap.style.display = 'none', 500);
    renderText(fullText);
    searchBtn.disabled = false;
  } catch(e) {
    viewer.innerHTML = '<div class="empty-state"><p>❌ ไม่สามารถอ่านไฟล์ได้: ' + e.message + '</p></div>';
    progressWrap.style.display = 'none';
  }
}

function showProgress(pct) {
  progressWrap.style.display = 'block';
  progressBar.style.width = pct + '%';
}

async function readPDF(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  let text = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    showProgress(10 + Math.floor((i / pdf.numPages) * 80));
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const pageText = content.items.map(item => item.str).join(' ');
    text += `\n\n--- หน้า ${i} ---\n\n` + pageText;
  }
  return text;
}

async function readDocx(file) {
  const arrayBuffer = await file.arrayBuffer();
  showProgress(50);
  const result = await mammoth.extractRawText({ arrayBuffer });
  showProgress(90);
  return result.value;
}

function renderText(text) {
  const content = document.createElement('div');
  content.className = 'viewer-content';
  content.id = 'viewerContent';
  content.textContent = text;
  viewer.innerHTML = '';
  viewer.appendChild(content);
}

// Search
searchBtn.addEventListener('click', doSearch);
searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

document.getElementById('clearBtn').addEventListener('click', clearSearch);
document.getElementById('prevBtn').addEventListener('click', () => navigateTo(currentMatchIndex - 1));
document.getElementById('nextBtn').addEventListener('click', () => navigateTo(currentMatchIndex + 1));

function doSearch() {
  const query = searchInput.value.trim();
  if (!query || !fullText) return;

  const caseSensitive = document.getElementById('caseSensitive').checked;
  const wholeWord = document.getElementById('wholeWord').checked;

  // Build regex
  let pattern = escapeRegex(query);
  if (wholeWord) pattern = `\\b${pattern}\\b`;
  const flags = caseSensitive ? 'g' : 'gi';
  let regex;
  try { regex = new RegExp(pattern, flags); }
  catch(e) { alert('รูปแบบการค้นหาไม่ถูกต้อง'); return; }

  // Highlight in viewer
  const content = document.getElementById('viewerContent');
  if (!content) return;
  const raw = content.textContent;
  const matches = [...raw.matchAll(regex)];
  totalMatches = matches.length;

  if (totalMatches === 0) {
    renderResults([]);
    return;
  }

  // Build highlighted HTML
  let html = '';
  let last = 0;
  matches.forEach((m, i) => {
    html += escapeHTML(raw.slice(last, m.index));
    html += `<mark id="mk${i}" class="${i===0?'active-mark':''}">${escapeHTML(m[0])}</mark>`;
    last = m.index + m[0].length;
  });
  html += escapeHTML(raw.slice(last));
  content.innerHTML = html;
  content.style.whiteSpace = 'pre-wrap';

  markElements = Array.from(content.querySelectorAll('mark'));
  currentMatchIndex = 0;

  // Results panel
  renderResults(matches, raw);

  // Toolbar
  document.getElementById('matchBadge').style.display = 'flex';
  document.getElementById('clearBtn').style.display = 'inline-block';
  document.getElementById('prevBtn').disabled = false;
  document.getElementById('nextBtn').disabled = false;
  updateBadge();
  scrollToMark(0);
}

function renderResults(matches, raw) {
  const panel = document.getElementById('resultsPanel');
  if (matches.length === 0) {
    panel.innerHTML = '<div class="result-count">ไม่พบคำที่ค้นหา</div>';
    return;
  }
  const contextLen = 60;
  let html = `<div class="result-count">พบ <span>${matches.length}</span> รายการ</div>`;
  matches.forEach((m, i) => {
    const start = Math.max(0, m.index - contextLen);
    const end = Math.min(raw.length, m.index + m[0].length + contextLen);
    const before = escapeHTML(raw.slice(start, m.index));
    const word = escapeHTML(m[0]);
    const after = escapeHTML(raw.slice(m.index + m[0].length, end));
    const prefix = start > 0 ? '…' : '';
    const suffix = end < raw.length ? '…' : '';
    html += `<div class="match-item" id="ri${i}" onclick="navigateTo(${i})">
      <div class="match-num">#${i+1}</div>
      <div class="match-context">${prefix}${before}<mark>${word}</mark>${after}${suffix}</div>
    </div>`;
  });
  panel.innerHTML = html;
}

function navigateTo(idx) {
  if (idx < 0 || idx >= totalMatches) return;
  if (markElements[currentMatchIndex]) markElements[currentMatchIndex].classList.remove('active-mark');
  const prevItem = document.getElementById(`ri${currentMatchIndex}`);
  if (prevItem) prevItem.classList.remove('active');

  currentMatchIndex = idx;
  if (markElements[currentMatchIndex]) markElements[currentMatchIndex].classList.add('active-mark');
  const item = document.getElementById(`ri${currentMatchIndex}`);
  if (item) { item.classList.add('active'); item.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }
  updateBadge();
  scrollToMark(currentMatchIndex);
}

function scrollToMark(i) {
  const el = document.getElementById(`mk${i}`);
  if (el) el.scrollIntoView({ block: 'center', behavior: 'smooth' });
}

function updateBadge() {
  document.getElementById('currentMatchNum').textContent = currentMatchIndex + 1;
  document.getElementById('totalMatchNum').textContent = totalMatches;
}

function clearSearch() {
  const content = document.getElementById('viewerContent');
  if (content && fullText) { content.textContent = fullText; content.style.whiteSpace = 'pre-wrap'; }
  document.getElementById('resultsPanel').innerHTML = '<div class="empty-state" id="emptyState"><div class="big-icon">📋</div><p>อัปโหลดเอกสารแล้วพิมพ์คำค้นหา</p></div>';
  document.getElementById('matchBadge').style.display = 'none';
  document.getElementById('clearBtn').style.display = 'none';
  document.getElementById('prevBtn').disabled = true;
  document.getElementById('nextBtn').disabled = true;
  markElements = [];
  totalMatches = 0;
  currentMatchIndex = 0;
}

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function escapeHTML(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
